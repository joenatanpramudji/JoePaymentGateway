# ==============================================================================
# JoePaymentGateway - Base Configuration
# ==============================================================================
# This file contains shared configuration across ALL environments.
# Environment-specific overrides are in application-{profile}.yml files.
#
# To switch environments, use ONE of:
#   1. VM arg:      -Dspring.profiles.active=local
#   2. Env var:     SPRING_PROFILES_ACTIVE=dev
#   3. CLI arg:     --spring.profiles.active=prod
# ==============================================================================

spring:
  application:
    name: joe-payment-gateway

  # ------------------------------------------------
  # Default profile: local (safe for development)
  # ------------------------------------------------
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ------------------------------------------------
  # JPA / Hibernate shared settings
  # ------------------------------------------------
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ------------------------------------------------
  # Jackson serialization defaults
  # Note: Spring Boot 4.x uses Jackson 3.x (tools.jackson package).
  #       WRITE_DATES_AS_TIMESTAMPS is disabled by default in Jackson 3.x,
  #       so dates already serialize as ISO 8601 strings out of the box.
  # ------------------------------------------------
  jackson:
    default-property-inclusion: non_null

# ------------------------------------------------
# Server defaults
# ------------------------------------------------
server:
  error:
    include-message: always
    include-binding-errors: always

# ------------------------------------------------
# Actuator health endpoint (all environments)
# ------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ------------------------------------------------
# Application-specific configuration
# ------------------------------------------------
app:
  name: JoePaymentGateway
  version: 1.0.0
