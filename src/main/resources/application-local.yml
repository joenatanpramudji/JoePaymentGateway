# ==============================================================================
# JoePaymentGateway - LOCAL Environment
# ==============================================================================
# Used for day-to-day development on your machine.
# Uses H2 in-memory database — no external dependencies needed.
#
# Activate with: -Dspring.profiles.active=local
# ==============================================================================

spring:
  # ------------------------------------------------
  # H2 in-memory database for local development
  # ------------------------------------------------
  datasource:
    url: jdbc:h2:mem:paymentgateway;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # ------------------------------------------------
  # H2 web console for inspecting data
  # Accessible at: http://localhost:8080/h2-console
  # ------------------------------------------------
  h2:
    console:
      enabled: true
      path: /h2-console

  # ------------------------------------------------
  # JPA: auto-create tables from entities
  # ------------------------------------------------
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # ------------------------------------------------
  # Relaxed security for local testing
  # ------------------------------------------------
  security:
    user:
      name: admin
      password: admin

# ------------------------------------------------
# Server port
# ------------------------------------------------
server:
  port: 8080

# ------------------------------------------------
# Verbose logging for local debugging
# ------------------------------------------------
logging:
  level:
    root: INFO
    com.joe.paymentgateway: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ------------------------------------------------
# Crypto configuration for local development
# ------------------------------------------------
app:
  crypto:
    # WARNING: This BDK is for LOCAL TESTING ONLY. Never use in production.
    bdk: 0123456789ABCDEFFEDCBA9876543210FEDCBA98765432100123456789ABCDEF
    key-store-type: IN_MEMORY
