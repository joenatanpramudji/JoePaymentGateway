name: Build & Deploy to EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '25'
  APP_NAME: joe-payment-gateway

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Build and test
  # ─────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (skip tests first for compilation check)
        run: mvn compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Package JAR
        run: mvn package -B -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 5

  # ─────────────────────────────────────────────────────
  # Job 2: Deploy to EC2 (only on push to main)
  # ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./target

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop existing application if running
            sudo systemctl stop paymentgateway || true

            # Ensure app directory exists
            mkdir -p ~/app

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "~/app/"
          strip_components: 1

      - name: Start application on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Rename to consistent filename
            cd ~/app
            mv -f *.jar app.jar

            # Restart via systemd
            sudo systemctl restart paymentgateway

            # Wait and verify
            sleep 10
            if sudo systemctl is-active --quiet paymentgateway; then
              echo "Application started successfully!"
            else
              echo "ERROR: Application failed to start"
              sudo journalctl -u paymentgateway --no-pager -n 30
              exit 1
            fi
